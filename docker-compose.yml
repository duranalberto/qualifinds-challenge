services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      AUTH_DEMO_TOKEN: demo-token
      CORS_ALLOWED_ORIGINS: '["http://localhost:3100","http://127.0.0.1:3100"]'
      DATABASE_URL: sqlite+aiosqlite:////app/data/workflow_challenge.db
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: gemma4:latest
    ports:
      - "8100:8100"
    volumes:
      - backend-data:/app/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8100
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3100:3100"

volumes:
  backend-data:
